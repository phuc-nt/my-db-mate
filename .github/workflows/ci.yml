name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test (safety adversarial gate)
        run: npm test

      - name: Build
        # A syntactically-valid DATABASE_URL is enough: nothing connects at build time.
        env:
          DATABASE_URL: postgres://build:build@localhost:5432/build
        run: npm run build
